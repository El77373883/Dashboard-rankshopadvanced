<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyCrafting - Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6366f1;--bg:#0a0e1a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%)}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .brand{text-align:center;margin-bottom:30px}
        .logo-icon{width:70px;height:70px;background:var(--gradient);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 15px;animation:gradient 3s ease infinite,float 3s ease-in-out infinite}
        .logo-text{font-size:28px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradient 3s ease infinite}
        .register-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:450px;animation:slideUp 0.5s ease}
        .register-header{text-align:center;margin-bottom:25px}
        .register-title{font-size:22px;font-weight:600;margin-bottom:5px}
        .register-subtitle{color:var(--text-muted);font-size:14px}
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:6px;font-size:13px;color:var(--text-muted)}
        .input-wrapper{position:relative}
        .input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
        input{width:100%;padding:12px 14px 12px 40px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px}
        input:focus{outline:none;border-color:var(--primary)}
        .btn{width:100%;padding:14px;background:var(--gradient);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
        .btn:hover{opacity:0.95}
        .btn:disabled{opacity:0.6;cursor:not-allowed}
        .error{color:#ef4444;font-size:13px;margin-top:10px;display:none}
        .error.show{display:block}
        .success{color:#10b981;font-size:13px;margin-top:10px;display:none;text-align:center}
        .success.show{display:block}
        .info{background:rgba(99,102,241,0.15);border:1px solid var(--primary);border-radius:10px;padding:12px;margin-top:15px;font-size:13px;color:var(--text-muted)}
        .login-link{text-align:center;margin-top:20px;color:var(--text-muted);font-size:14px}
        .login-link a{color:var(--primary);text-decoration:none;font-weight:600}
    </style>
</head>
<body>
    <div class="brand">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <div class="logo-text">BuyCrafting</div>
    </div>
    <div class="register-card">
        <div class="register-header">
            <div class="register-title">Crear Tu Tienda</div>
            <div class="register-subtitle">Registra tu servidor de Minecraft</div>
        </div>
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Nombre del Servidor</label>
                <div class="input-wrapper">
                    <input type="text" id="serverName" placeholder="Ej: MiServer SMP" required>
                    <i class="fas fa-server"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="admin@miserver.com" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="btn" id="registerBtn"><i class="fas fa-user-plus"></i> Crear Tienda</button>
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg">
                ✅ ¡Registro exitoso!<br>
                Tu token: <strong id="generatedToken" style="color:var(--primary);font-family:monospace;font-size:16px"></strong><br>
                <small>Guárdalo en el config.yml del plugin</small>
            </div>
        </form>
        <div class="info">
            <i class="fas fa-info-circle"></i> 
            Al registrarte, recibirás un token único para conectar tu plugin.
        </div>
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIGXn0zND_8A_nD6NPxx1txYFQzrhM9hg",
            authDomain: "rankshop-9c9d3.firebaseapp.com",
            projectId: "rankshop-9c9d3",
            storageBucket: "rankshop-9c9d3.firebasestorage.app",
            messagingSenderId: "556660639350",
            appId: "1:556660639350:web:23734d089097e50c9ec157"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function showError(msg){ const el = document.getElementById('errorMsg'); el.innerText = '⚠ '+msg; el.classList.add('show'); }
        function showSuccess(msg){ const el = document.getElementById('successMsg'); el.classList.add('show'); }

        function generateToken(){
            return 'sk_' + Math.random().toString(36).substring(2, 8) + Math.random().toString(36).substring(2, 8);
        }

        window.handleRegister = async function(e){
            e.preventDefault();
            const serverName = document.getElementById('serverName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('registerBtn');
            const err = document.getElementById('errorMsg');
            const succ = document.getElementById('successMsg');

            err.classList.remove('show');
            succ.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';

            try{
                // Generar ID único y token
                const serverId = 'server_' + Math.random().toString(36).substring(2, 10);
                const token = generateToken();

                // Crear documento del servidor
                await setDoc(doc(db, 'servers', serverId), {
                    serverName: serverName,
                    ownerEmail: email,
                    password: password, // ⚠️ En producción, usar Firebase Auth
                    token: token,
                    createdAt: new Date(),
                    active: true
                });

                // Crear config inicial
                await setDoc(doc(db, 'configs', serverId), {
                    apiKey: token,
                    serverName: serverName,
                    currency: 'USD',
                    createdAt: new Date()
                });

                // Mostrar token generado
                document.getElementById('generatedToken').innerText = token;
                showSuccess();
                btn.innerHTML = '<i class="fas fa-check"></i> ¡Registrado!';
                
                // Guardar en localStorage para login automático
                localStorage.setItem('buycrafting_auth', 'true');
                localStorage.setItem('buycrafting_serverId', serverId);
                localStorage.setItem('buycrafting_token', token);

                // Redirigir al dashboard después de 3 segundos
                setTimeout(() => { window.location.href = 'index.html'; }, 3000);

            } catch(error){
                console.error('Register error:', error);
                showError('Error: '+error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear Tienda';
            }
        };
    </script>
</body>
</html>
