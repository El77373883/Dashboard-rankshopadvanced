<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // ✅ TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCIGXn0zND_8A_nD6NPxx1txYFQzrhM9hg",
        authDomain: "rankshop-9c9d3.firebaseapp.com",
        projectId: "rankshop-9c9d3",
        storageBucket: "rankshop-9c9d3.firebasestorage.app",
        messagingSenderId: "556660639350",
        appId: "1:556660639350:web:23734d089097e50c9ec157"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentSection = 'dashboard';

    document.addEventListener('DOMContentLoaded', async function(){
        console.log('🚀 BuyCrafting con Firebase iniciando...');
        setTimeout(()=>{document.getElementById('loadingScreen').classList.add('hidden');},4000);
        if(localStorage.getItem('buycrafting_auth') !== 'true'){ window.location.href = 'login.html'; return; }
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        loadDashboard(); loadApiKey();
        console.log('✅ Dashboard listo con Firebase');
    });

    window.toggleMenu = function(){ document.querySelector('.sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); };

    window.showSection = function(section){
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        document.getElementById(section).classList.add('active');
        if(event?.currentTarget) event.currentTarget.classList.add('active');
        const titles={dashboard:'Dashboard',products:'Productos',orders:'Órdenes',settings:'Configuración'};
        document.getElementById('pageTitle').innerText = titles[section];
        currentSection = section;
        if(window.innerWidth<1024) window.toggleMenu();
        if(section==='dashboard') loadDashboard();
        if(section==='products') loadProducts();
        if(section==='orders') loadAllOrders();
        if(section==='settings') loadApiKey();
    };

    window.showNotification = function(msg,type='success'){
        const n = document.getElementById('notification');
        document.getElementById('notificationText').innerText = msg;
        n.className = 'notification show ' + type;
        setTimeout(()=>{n.className='notification'},3000);
    };

    window.openProductModal = ()=>{document.getElementById('productModal').classList.add('active');};
    window.openOrderModal = ()=>{loadProductsForSelect();document.getElementById('orderModal').classList.add('active');};
    window.closeModal = (id)=>{document.getElementById(id).classList.remove('active');};
    window.copyApiKey = ()=>{navigator.clipboard.writeText(document.getElementById('apiKeyDisplay').innerText);window.showNotification('Key copiada');};

    async function loadApiKey(){
        try{
            const configRef = doc(db, 'config', 'settings');
            const configSnap = await getDoc(configRef);
            if(configSnap.exists()){
                const key = configSnap.data().apiKey;
                document.getElementById('apiKeyDisplay').innerText = key;
                document.getElementById('newApiKey').value = key;
            }
        }catch(e){console.error('Error loading key:',e);}
    }

    async function updateApiKey(){
        try{
            const newKey = document.getElementById('newApiKey').value || 'sk_live_'+Math.random().toString(36).substring(2,15);
            await setDoc(doc(db, 'config', 'settings'), { apiKey: newKey }, { merge: true });
            window.showNotification('Key actualizada: '+newKey);
            loadApiKey();
        }catch(e){window.showNotification('Error: '+e.message,'error');}
    }

    async function loadDashboard(){
        try{
            const ordersSnap = await getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc'), limit(5)));
            const orders = []; ordersSnap.forEach(d=>{orders.push({id:d.id,...d.data()});});
            document.getElementById('totalOrders').innerText = orders.length;
            const pending = orders.filter(o=>!o.delivered).length;
            document.getElementById('pendingOrders').innerText = pending;
            const productsSnap = await getDocs(collection(db, 'products'));
            document.getElementById('totalProducts').innerText = productsSnap.size;
            document.getElementById('totalRevenue').innerText = '$'+(orders.length*5).toFixed(2);
            const tbody = document.getElementById('recentOrdersTable'); tbody.innerHTML = '';
            if(orders.length){
                orders.forEach(o=>{
                    tbody.innerHTML += `<tr><td>#${o.id.substr(0,8)}</td><td>${o.playerName||'-'}</td><td>${o.productName||'-'}</td><td>${o.createdAt?new Date(o.createdAt.toDate()).toLocaleDateString():'-'}</td><td><span class="badge ${o.delivered?'success':'pending'}">${o.delivered?'Entregado':'Pendiente'}</span></td></tr>`;
                });
            } else { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Sin órdenes</td></tr>'; }
        }catch(e){console.error('Error:',e);window.showNotification('Error cargando datos','error');}
    }

    async function loadProducts(){
        try{
            const snap = await getDocs(collection(db, 'products'));
            const tbody = document.getElementById('productsTable'); tbody.innerHTML = '';
            if(!snap.empty){
                snap.forEach(d=>{ const p=d.data(); tbody.innerHTML += `<tr><td>${p.name}</td><td>$${p.price||0}</td><td><code style="background:var(--bg);padding:4px 8px;border-radius:4px;font-size:12px">${p.command}</code></td><td><button class="btn btn-sm btn-danger" onclick="window.deleteProduct('${d.id}')"><i class="fas fa-trash"></i></button></td></tr>`; });
            } else { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Sin productos</td></tr>'; }
        }catch(e){console.error('Error:',e);}
    }

    window.createProduct = async function(){
        try{
            const name=document.getElementById('prodName').value, price=parseFloat(document.getElementById('prodPrice').value)||0, command=document.getElementById('prodCommand').value;
            if(!name||!command){window.showNotification('Nombre y comando requeridos','error');return;}
            await addDoc(collection(db,'products'),{name,price,command,createdAt:new Date()});
            window.showNotification('Producto creado'); closeModal('productModal');
            document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('prodCommand').value='';
            loadProducts(); loadDashboard();
        }catch(e){window.showNotification('Error: '+e.message,'error');}
    };

    async function loadProductsForSelect(){
        try{
            const snap = await getDocs(collection(db,'products'));
            const sel = document.getElementById('orderProduct'); sel.innerHTML = '<option value="">Seleccionar...</option>';
            snap.forEach(d=>{ const p=d.data(); sel.innerHTML += `<option value="${p.command}">${p.name} - $${p.price}</option>`; });
        }catch(e){console.error('Error:',e);}
    }

    window.createOrder = async function(){
        try{
            const player=document.getElementById('orderPlayer').value, command=document.getElementById('orderProduct').value;
            if(!player||!command){window.showNotification('Jugador y producto requeridos','error');return;}
            const configSnap = await getDoc(doc(db,'config','settings'));
            const apiKey = configSnap.exists()?configSnap.data().apiKey:'sk_live_demo123';
            await addDoc(collection(db,'orders'),{playerName:player,productName:command,apiKey,delivered:false,createdAt:new Date()});
            window.showNotification('Orden creada'); closeModal('orderModal');
            loadAllOrders(); loadDashboard();
        }catch(e){window.showNotification('Error: '+e.message,'error');}
    };

    async function loadAllOrders(){
        try{
            const snap = await getDocs(query(collection(db,'orders'),orderBy('createdAt','desc')));
            const tbody = document.getElementById('allOrdersTable'); tbody.innerHTML = '';
            if(!snap.empty){
                snap.forEach(d=>{ const o=d.data(); tbody.innerHTML += `<tr><td>#${d.id.substr(0,8)}</td><td>${o.playerName||'-'}</td><td>${o.productName||'-'}</td><td><span class="badge ${o.delivered?'success':'pending'}">${o.delivered?'Entregado':'Pendiente'}</span></td><td><button class="btn btn-sm btn-danger" onclick="window.deleteOrder('${d.id}')"><i class="fas fa-trash"></i></button></td></tr>`; });
            } else { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Sin órdenes</td></tr>'; }
        }catch(e){console.error('Error:',e);}
    }

    window.deleteProduct = async function(id){ if(!confirm('¿Eliminar?'))return; try{ await deleteDoc(doc(db,'products',id)); window.showNotification('Eliminado'); loadProducts(); loadDashboard(); }catch(e){window.showNotification('Error: '+e.message,'error');} };
    window.deleteOrder = async function(id){ if(!confirm('¿Eliminar?'))return; try{ await deleteDoc(doc(db,'orders',id)); window.showNotification('Eliminado'); loadAllOrders(); loadDashboard(); }catch(e){window.showNotification('Error: '+e.message,'error');} };

    window.logout = function(){ localStorage.removeItem('buycrafting_auth'); localStorage.removeItem('buycrafting_key'); window.showNotification('Sesión cerrada'); setTimeout(()=>{window.location.href='login.html'},1500); };
    window.onclick = function(e){ if(e.target.classList.contains('modal')) e.target.classList.remove('active'); };
</script>
