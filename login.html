<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyCrafting - Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6366f1;--bg:#0a0e1a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%)}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .brand{text-align:center;margin-bottom:30px}
        .logo-icon{width:70px;height:70px;background:var(--gradient);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 15px;animation:gradient 3s ease infinite,float 3s ease-in-out infinite}
        .logo-text{font-size:28px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradient 3s ease infinite}
        .login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:400px;animation:slideUp 0.5s ease}
        .login-header{text-align:center;margin-bottom:25px}
        .login-title{font-size:22px;font-weight:600;margin-bottom:5px}
        .login-subtitle{color:var(--text-muted);font-size:14px}
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:6px;font-size:13px;color:var(--text-muted)}
        .input-wrapper{position:relative}
        .input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
        input{width:100%;padding:12px 14px 12px 40px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px}
        input:focus{outline:none;border-color:var(--primary)}
        .password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer}
        .btn{width:100%;padding:14px;background:var(--gradient);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
        .btn:hover{opacity:0.95}
        .btn:disabled{opacity:0.6;cursor:not-allowed}
        .error{color:#ef4444;font-size:13px;margin-top:10px;display:none}
        .error.show{display:block}
        .success{color:#10b981;font-size:13px;margin-top:10px;display:none}
        .success.show{display:block}
        .info{background:rgba(99,102,241,0.15);border:1px solid var(--primary);border-radius:10px;padding:12px;margin-top:15px;font-size:13px;color:var(--text-muted)}
        .info code{background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--primary);font-family:monospace}
    </style>
</head>
<body>
    <div class="brand">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <div class="logo-text">BuyCrafting</div>
    </div>
    <div class="login-card">
        <div class="login-header">
            <div class="login-title">Acceso al Panel</div>
            <div class="login-subtitle">Ingresa tu API Key</div>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>API Key</label>
                <div class="input-wrapper">
                    <input type="password" id="apiKey" placeholder="sk_live_..." required autocomplete="off" value="Adrian2005@">
                    <i class="fas fa-key"></i>
                    <button type="button" class="password-toggle" onclick="toggleKey()"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Acceder</button>
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>
        </form>
        <div class="info">
            <i class="fas fa-info-circle"></i> Tu key: <code>Adrian2005@</code>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIGXn0zND_8A_nD6NPxx1txYFQzrhM9hg",
            authDomain: "rankshop-9c9d3.firebaseapp.com",
            projectId: "rankshop-9c9d3",
            storageBucket: "rankshop-9c9d3.firebasestorage.app",
            messagingSenderId: "556660639350",
            appId: "1:556660639350:web:23734d089097e50c9ec157"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleKey = function(){
            const input = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            if(input.type === 'password'){ input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        };

        function showError(msg){ const el = document.getElementById('errorMsg'); el.innerText = '⚠ '+msg; el.classList.add('show'); }
        function showSuccess(msg){ const el = document.getElementById('successMsg'); el.innerText = '✅ '+msg; el.classList.add('show'); }

        window.handleLogin = async function(e){
            e.preventDefault();
            const key = document.getElementById('apiKey').value.trim();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            const succ = document.getElementById('successMsg');
            err.classList.remove('show'); succ.classList.remove('show');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';

            // ✅ TU KEY PERSONALIZADA - ENTRADA DIRECTA SIN FIREBASE
            if(key === 'Adrian2005@'){
                showSuccess('¡Acceso concedido!');
                localStorage.setItem('buycrafting_auth', 'true');
                localStorage.setItem('buycrafting_key', key);
                // Redirección directa sin bucle
                window.location.replace('index.html');
                return;
            }

            try{
                const configRef = doc(db, 'config', 'settings');
                const configSnap = await getDoc(configRef);
                if(configSnap.exists()){
                    if(key === configSnap.data().apiKey){
                        showSuccess('¡Bienvenido!');
                        localStorage.setItem('buycrafting_auth', 'true');
                        localStorage.setItem('buycrafting_key', key);
                        window.location.replace('index.html');
                    } else { showError('API Key incorrecta'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acceder'; }
                } else {
                    await setDoc(configRef, { apiKey: 'Adrian2005@' });
                    showError('Config creada. Usa: Adrian2005@');
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acceder';
                }
            } catch(error){
                console.error('Login error:', error);
                showError('Error: '+error.message);
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acceder';
            }
        };

        // ✅ SOLO redirigir si NO estamos en login
        const currentPath = window.location.pathname;
        if(localStorage.getItem('buycrafting_auth') === 'true' && !currentPath.includes('login.html')){
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
